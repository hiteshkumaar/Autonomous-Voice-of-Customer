name: Weekly VoC Agent

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion pipeline
        env:
          CLAWDBOT_API_KEY: ${{ secrets.CLAWDBOT_API_KEY }}
          CLAWDBOT_BASE_URL: ${{ secrets.CLAWDBOT_BASE_URL }}
          CLAWDBOT_MODEL: ${{ secrets.CLAWDBOT_MODEL }}
        run: python -m voc_agent.pipeline

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: weekly-voc-outputs
          path: outputs/
